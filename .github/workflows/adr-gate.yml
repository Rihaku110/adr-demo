name: ADR Gate

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  adr-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check ADR is required only for code changes
        run: |
          echo "Event: ${{ github.event_name }}"

          # PR と push で diff の取り方を分岐
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Using PR diff"
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            echo "Using push diff"
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # ADRがあるならOK
          if echo "$CHANGED" | grep -q '^adrs/.*\.md$'; then
            echo "ADR found."
            exit 0
          fi

          # コード変更がある場合だけADR必須
          if echo "$CHANGED" | grep -qE '^(src/|react-app/src/|package.json|package-lock.json|vite.config.js|eslint.config.js)'; then
            echo "ADR is required for code changes."
            echo "Create adrs/<NNNN>-<title>.md"
            exit 1
          fi

          # READMEなどの軽微な変更はADR不要
          echo "No ADR required for this change."
          exit 0