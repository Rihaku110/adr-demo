name: ADR Gate

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  adr-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            git fetch origin ${{ github.base_ref }}
            CHANGED=$(git diff --name-only $BASE...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # GitHub Actionsの後続stepで使えるように保存
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: ADR Gate Check
        run: |
          CHANGED="${{ steps.changed-files.outputs.changed }}"

          echo "Evaluating ADR requirement..."
          echo "$CHANGED"

          # コード変更があるか確認
          if echo "$CHANGED" | grep -qE '^(src/|react-app/src/|package.json|package-lock.json|vite.config.js|eslint.config.js)'; then
            echo "Code changes detected."

            # 今回の変更にADRが含まれているか確認
            if echo "$CHANGED" | grep -qE '^adrs/[0-9]{4}-.+\.md$'; then
              echo "ADR found in this change."
              exit 0
            fi

            echo "ADR is required for code changes."
            echo "Create adrs/<NNNN>-<title>.md"
            exit 1
          fi

          echo "No ADR required for this change."
          exit 0